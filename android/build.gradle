buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Force compatible androidx.core versions for RN 0.74 + Firebase
subprojects {
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.13.1'
            force 'androidx.core:core-ktx:1.13.1'
        }
    }
}

// Ensure all subprojects use the same SDK versions as the main app
subprojects { sub ->
    sub.plugins.withId("com.android.library") {
        sub.android {
            if (sub.android.compileSdkVersion != "android-${rootProject.ext.compileSdkVersion}") {
                sub.android.compileSdkVersion rootProject.ext.compileSdkVersion
            }
        }
    }
}
